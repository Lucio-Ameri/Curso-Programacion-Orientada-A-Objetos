<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintech POO - Login</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="app-shell centered">
    <section class="card auth-card">
        <h1>Fintech POO</h1>
        <p class="muted">Iniciá sesión para gestionar tus cuentas.</p>

        <form id="loginForm" class="form-grid">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="tu@email.com" required />

            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" placeholder="********" required />

            <button type="submit" class="btn primary">Ingresar</button>
        </form>

        <p id="loginMessage" class="feedback"></p>

        <div class="auth-links">
            <span>¿No tenés usuario?</span>
            <a href="/register.html">Registrate</a>
        </div>
    </section>
</div>

<script type="module" src="/js/login.js"></script>
</body>
</html>
