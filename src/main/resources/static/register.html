<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Fintech POO</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="app-shell centered">
    <section class="card auth-card wide">
        <h1>Crear usuario</h1>
        <p class="muted">Completá tus datos para registrarte.</p>

        <form id="registerForm" class="form-grid two-cols">
            <div>
                <label for="nombre">Nombre</label>
                <input id="nombre" name="nombre" type="text" required />
            </div>

            <div>
                <label for="apellido">Apellido</label>
                <input id="apellido" name="apellido" type="text" required />
            </div>

            <div class="full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>

            <div>
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" required />
            </div>

            <div>
                <label for="dni">DNI</label>
                <input id="dni" name="dni" type="text" maxlength="8" inputmode="numeric" required />
            </div>

            <div class="full">
                <button type="submit" class="btn primary">Registrarme</button>
            </div>
        </form>

        <p id="registerMessage" class="feedback"></p>

        <div class="auth-links">
            <a href="/index.html">Volver al login</a>
        </div>
    </section>
</div>

<script type="module" src="/js/register.js"></script>
</body>
</html>
